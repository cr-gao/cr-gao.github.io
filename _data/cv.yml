# RenderCV-style schema (https://rendercv.com/), consumed by the Jekyll CV page
# at /cv/. The upstream render-cv.yml workflow (which compiled this into a PDF)
# was removed: al-folio's own cv.yml no longer validates against current RenderCV,
# which rejects `label`/`image`/`summary` as unknown fields. The PDF linked from
# /cv/ is whatever you drop at assets/pdf/cv.pdf.
#
# Section titles are dispatched by *exact* name — see the note above Open Source
# Projects below.
cv:
  name: Chenrui Gao
  label: LLM Infrastructure — inference & training systems
  # TODO: uncomment and fill in (must be a valid address, or RenderCV rejects it)
  # email: crgao@umich.edu
  # location: Shanghai, China
  image: ""
  summary: >-
    Computer Engineering Class of 2026 at University of Michigan, joining UT Austin's
    MSCS program in Fall 2026. I work on LLM infrastructure — inference engines and
    RL post-training / rollout systems: high-throughput inference, RL training
    infrastructure, and agentic RL rollout scheduling. Previously robotics research
    at CMU's ARCS Lab on multi-agent path planning. Strong C++ and Python.

  # TODO: fill in your usernames (these are also set separately in _data/socials.yml)
  social_networks:
    - network: GitHub
      username: cr-gao
    - network: LinkedIn
      username: chenrui-gao

  sections:
    Education:
      - institution: University of Texas at Austin
        location: Austin, TX, USA
        url: https://www.cs.utexas.edu/
        area: Computer Science
        degree: MSCS
        start_date: 2026-08
        end_date: present
        highlights:
          - Incoming, Fall 2026.

      - institution: University of Michigan
        location: Ann Arbor, MI, USA
        url: https://www.eecs.umich.edu/
        area: Computer Engineering
        degree: BSE
        start_date: 2024-08 # TODO: verify your actual start date
        end_date: 2026-05 # TODO: verify your actual graduation date

      - institution: Shanghai Jiao Tong University
        location: Shanghai, China
        url: https://www.gc.sjtu.edu.cn/
        area: Mechanical Engineering
        degree: BSE
        start_date: 2022-08 # TODO: verify your actual start date
        end_date: 2026-08 # TODO: verify your actual graduation date

    Experience:
      - company: CMU ARCS Lab
        position: Research Intern
        location: Pittsburgh, PA, USA
        start_date: 2024-11
        end_date: 2025-11
        summary: Robotics research on multi-agent path planning (VAMP-MR). # TODO: add start_date / end_date

    Projects:
      - name: Mini Inference Engine
        date: 2026 - present
        highlights:
          - From-scratch LLM inference engine (nano-vLLM tradition) — paged KV cache, continuous batching, request scheduler.
          - Building toward speculative decoding and/or MoE-aware optimization.

      - name: RL Rollout Scheduler on verl
        date: 2026 - present
        highlights:
          - Reframes oversample-and-cancel as priority-based admission; oversampled requests become low-priority backfill competing for GPU throughout generation.
          - Studies the length-correlated bias naive cancellation introduces — costly for reasoning RL, where long trajectories carry high GRPO learning value.
          - Targets a throughput-quality frontier with bias-bounded alternatives (partial rollout with pause/resume, importance-weighted truncation, randomized cancel).

      - name: auto-eln
        date: 2026
        highlights:
          - Worker-Manager system for automated instrument data capture (undergraduate capstone).
          - Flask/SQLAlchemy manager, PySide6 worker, PostgreSQL with a template-driven schema.

    # NOTE: the CV page dispatches on the *exact* section title. "Open Source Projects"
    # and "Projects" both render with the project template; an unrecognised title
    # (e.g. plain "Open Source") falls through to a generic renderer and shows nothing.
    Open Source Projects:
      - name: verl-omni
        url: https://github.com/verl-project/verl-omni
        highlights:
          - "Merged PRs #242, #246, #252 — reward-metric fixes, and rollout-server profiling with a lightweight FlowGRPO profiling recipe."

      - name: vLLM-Omni
        url: https://github.com/vllm-project/vllm-omni
        highlights:
          - "Open PR #5059 — merge-on-load fast path for diffusion LoRA (shadow wrappers)."

    Skills:
      - name: Languages
        keywords: [C++, Python]
      - name: Systems
        # TODO: trim to what you actually want to claim
        keywords: [CUDA, vLLM, SGLang, verl, PyTorch]
